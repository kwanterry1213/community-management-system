services:
  - type: web
    name: community-management-system
    env: python
    buildCommand: "./render-build.sh"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NODE_VERSION
        value: 22.13.0
      # ⚠️ 注意：敏感環境變數（如 OPENROUTER_API_KEY）不應寫在這裡
      # 請在 Render Dashboard > Environment 頁籤中手動添加：
      # OPENROUTER_API_KEY = your-actual-api-key-here
